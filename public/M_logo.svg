<svg width="100%" viewBox="0 0 690 490" role="img" xmlns="http://www.w3.org/2000/svg" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">maehlo signature M logo</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Elegant cursive signature-style M logo for Malvin Boye / maehlo</desc>

  

  <rect width="680" height="480" fill="transparent" style="fill:rgba(0, 0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <g transform="translate(340, 240)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">

    <!-- DARK VERSION — centered at 0,0 -->
    <g transform="translate(-260, -160)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
      <!-- Dark bg pill -->
      <rect x="-20" y="-20" width="320" height="320" rx="12" style="fill:rgb(17, 17, 17);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

      <!-- The M — generous, flowing, signature style -->
      <!-- Left upstroke with entry flourish -->
      <path d="&#10;        M 30 240&#10;        C 28 220, 25 190, 30 160&#10;        C 35 130, 45 105, 55 90&#10;        C 62 78, 72 68, 80 65&#10;        C 90 60, 100 62, 108 70&#10;        C 118 80, 122 95, 125 115&#10;        L 140 200&#10;        C 142 212, 145 222, 148 228&#10;      " stroke-width="5.5" style="fill:none;stroke:rgb(255, 255, 255);color:rgb(0, 0, 0);stroke-width:5.5px;stroke-linecap:round;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

      <!-- Middle valley and right hump -->
      <path d="&#10;        M 148 228&#10;        C 155 218, 162 200, 168 180&#10;        C 174 160, 178 135, 182 118&#10;        C 186 100, 192 82, 200 72&#10;        C 208 62, 218 58, 228 60&#10;        C 240 63, 250 75, 256 92&#10;        C 264 112, 266 140, 265 165&#10;        C 264 185, 260 208, 255 225&#10;        C 252 235, 248 242, 244 248&#10;      " stroke-width="5.5" style="fill:none;stroke:rgb(255, 255, 255);color:rgb(0, 0, 0);stroke-width:5.5px;stroke-linecap:round;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

      <!-- Exit tail — the signature flourish -->
      <path d="&#10;        M 244 248&#10;        C 242 255, 240 262, 238 270&#10;        C 236 278, 235 285, 238 290&#10;        C 241 295, 248 296, 258 292&#10;        C 270 286, 285 272, 298 256&#10;      " stroke-width="4" style="fill:none;stroke:rgb(255, 255, 255);color:rgb(0, 0, 0);stroke-width:4px;stroke-linecap:round;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

      <!-- Subtle entry lead-in stroke -->
      <path d="&#10;        M 14 175&#10;        C 18 185, 24 210, 30 240&#10;      " stroke-width="3" opacity="0.5" style="fill:none;stroke:rgb(255, 255, 255);color:rgb(0, 0, 0);stroke-width:3px;stroke-linecap:round;stroke-linejoin:round;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    </g>

    <!-- LIGHT VERSION — right side -->
    <g transform="translate(20, -160)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
      <!-- Light bg pill -->
      <rect x="-20" y="-20" width="320" height="320" rx="12" stroke="#e8e8e8" stroke-width="1" style="fill:rgb(255, 255, 255);stroke:rgb(232, 232, 232);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

      <!-- The M — same paths, dark ink on white -->
      <path d="&#10;        M 30 240&#10;        C 28 220, 25 190, 30 160&#10;        C 35 130, 45 105, 55 90&#10;        C 62 78, 72 68, 80 65&#10;        C 90 60, 100 62, 108 70&#10;        C 118 80, 122 95, 125 115&#10;        L 140 200&#10;        C 142 212, 145 222, 148 228&#10;      " stroke-width="5.5" style="fill:none;stroke:rgb(17, 17, 17);color:rgb(0, 0, 0);stroke-width:5.5px;stroke-linecap:round;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

      <path d="&#10;        M 148 228&#10;        C 155 218, 162 200, 168 180&#10;        C 174 160, 178 135, 182 118&#10;        C 186 100, 192 82, 200 72&#10;        C 208 62, 218 58, 228 60&#10;        C 240 63, 250 75, 256 92&#10;        C 264 112, 266 140, 265 165&#10;        C 264 185, 260 208, 255 225&#10;        C 252 235, 248 242, 244 248&#10;      " stroke-width="5.5" style="fill:none;stroke:rgb(17, 17, 17);color:rgb(0, 0, 0);stroke-width:5.5px;stroke-linecap:round;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

      <path d="&#10;        M 244 248&#10;        C 242 255, 240 262, 238 270&#10;        C 236 278, 235 285, 238 290&#10;        C 241 295, 248 296, 258 292&#10;        C 270 286, 285 272, 298 256&#10;      " stroke-width="4" style="fill:none;stroke:rgb(17, 17, 17);color:rgb(0, 0, 0);stroke-width:4px;stroke-linecap:round;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

      <path d="&#10;        M 14 175&#10;        C 18 185, 24 210, 30 240&#10;      " stroke-width="3" opacity="0.35" style="fill:none;stroke:rgb(17, 17, 17);color:rgb(0, 0, 0);stroke-width:3px;stroke-linecap:round;stroke-linejoin:round;opacity:0.35;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    </g>

  </g>

  <!-- Labels -->
  <text x="200" y="448" text-anchor="middle" font-family="'Space Mono', monospace" font-size="11" fill="#999" letter-spacing="3" style="fill:rgb(153, 153, 153);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Space Mono&quot;, monospace;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:auto">dark</text>
  <text x="480" y="448" text-anchor="middle" font-family="'Space Mono', monospace" font-size="11" fill="#999" letter-spacing="3" style="fill:rgb(153, 153, 153);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Space Mono&quot;, monospace;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:auto">light</text>

</svg>